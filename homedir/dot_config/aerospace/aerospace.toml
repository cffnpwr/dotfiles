[[on-window-detected]]
run = "move-node-to-workspace T"

[on-window-detected.if]
app-id = "com.mitchellh.ghostty"

[[on-window-detected]]
run = "layout floating"

[on-window-detected.if]
app-id = "com.apple.finder"

[[on-window-detected]]
run = "layout floating"

[on-window-detected.if]
app-id = "com.bitwarden.desktop"

[[on-window-detected]]
run = "layout floating"

[on-window-detected.if]
app-id = "dev.mandre.rquickshare"

