name: Status check
on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - edited

permissions: {}

jobs:
  status-check:
    name: Status check
    permissions:
      pull-requests: read
      checks: read
      statuses: read
