name: CI
on:
  push:
    paths-ignore:
      - ".claude/**"
      - ".vscode/**"
      - ".editorconfig"
      - "CLAUDE.md"
      - "README.md"
      - "LICENSE"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flake-check:
    name: Flake Check
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@95732e95d70db3ba1e0adc26a63c5e0375aba78c # v3.14.0

      - name: Check flake
        run: nix flake check --all-systems

  format-check:
    name: Format Check
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@95732e95d70db3ba1e0adc26a63c5e0375aba78c # v3.14.0

      - name: Check formatting
        run: |
          nix fmt -- --check .

  install-check:
    name: Install Check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            hostname: cpwr-mba2
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Run install script
        run: ./install.sh --path $HOME/.dotfiles --hostname ${{ matrix.hostname }} --branch ${{ github.ref_name }} --yes
